<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>The Beautiful DAY!</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/odometer.js/0.4.7/themes/odometer-theme-minimal.min.css"
    />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/odometer.js/0.4.7/odometer.min.js"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap"
      rel="stylesheet"
    />

    <style>
      :root {
        --apple-gray: #1c1c1e;
        --apple-border: #2c2c2e;
      }

      body {
        font-family: "Inter", sans-serif;
        background-color: #000000;
        color: #ffffff;
        -webkit-font-smoothing: antialiased;
        overflow: hidden; /* Clean fullscreen look */
      }

      .apple-card {
        background-color: var(--apple-gray);
        border: 1px solid var(--apple-border);
        border-radius: 2.5rem;
        width: 100%;
        max-width: 100%;
      }

      .counter-size {
        font-size: clamp(2.8rem, 12vw, 8.5rem);
        line-height: 1;
        white-space: nowrap;
        display: block;
        width: 100%;
      }

      .odometer {
        font-weight: 800;
        color: #ffffff;
        letter-spacing: -0.06em;
        display: inline-block !important;
        white-space: nowrap !important;
      }

      .ios-progress {
        height: 2px;
        width: 60px;
        background: #3a3a3c;
        border-radius: 1px;
        overflow: hidden;
      }

      #progress-fill {
        height: 100%;
        width: 0%;
        background: #ffffff;
        transition: width 1s linear;
      }

      .label-caps {
        letter-spacing: 0.12em;
        font-size: 0.6rem;
        font-weight: 600;
        color: #8e8e93;
        text-transform: uppercase;
      }

      /* Fullscreen Button Styling */
      .fullscreen-btn {
        position: fixed;
        bottom: 2rem;
        right: 2rem;
        background: rgba(44, 44, 46, 0.6);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        padding: 0.8rem;
        border-radius: 1rem;
        cursor: pointer;
        transition: all 0.3s ease;
        opacity: 0.4;
      }
      .fullscreen-btn:hover {
        opacity: 1;
        background: rgba(44, 44, 46, 0.9);
        transform: scale(1.05);
      }

      @media (min-width: 640px) {
        .label-caps {
          font-size: 0.7rem;
        }
        .ios-progress {
          width: 100px;
        }
      }
    </style>
  </head>
  <body
    class="flex flex-col items-center justify-center min-h-screen p-4 sm:p-10"
  >
    <!-- Status Bar -->
    <div
      class="mb-10 flex items-center gap-3 bg-[#1C1C1E] border border-[#2C2C2E] px-5 py-2 rounded-full shadow-lg"
    >
      <span class="w-1.5 h-1.5 bg-green-500 rounded-full animate-pulse"></span>
      <span class="label-caps">Live Feed</span>
    </div>

    <!-- Main Container -->
    <div class="w-full max-w-5xl mx-auto">
      <div
        class="apple-card p-10 sm:p-16 md:p-24 flex flex-col items-center shadow-2xl"
      >
        <p class="label-caps mb-10 opacity-60">Global Play Count</p>

        <div
          class="counter-size flex items-center justify-center w-full text-center"
        >
          <div id="plays" class="odometer">0</div>
        </div>

        <div class="flex flex-col items-center gap-5 mt-12">
          <div class="ios-progress">
            <div id="progress-fill"></div>
          </div>
          <p
            class="text-[10px] text-[#636366] font-semibold tracking-widest uppercase"
          >
            Refreshing in <span id="timer">40</span>s
          </p>
        </div>
      </div>
    </div>

    <!-- Sub-Text -->
    <div class="mt-8 flex gap-4 items-center opacity-30">
      <span class="label-caps italic">{{ shortcode }}</span>
    </div>

    <!-- Fullscreen Button -->
    <button
      onclick="toggleFullscreen()"
      class="fullscreen-btn"
      title="Toggle Fullscreen"
    >
      <svg
        id="fs-icon"
        width="20"
        height="20"
        viewBox="0 0 24 24"
        fill="none"
        stroke="white"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
      >
        <path
          d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"
        ></path>
      </svg>
    </button>

    <script>
      const REFRESH_INTERVAL = 40;
      let timeRemaining = REFRESH_INTERVAL;

      // Fullscreen Logic
      function toggleFullscreen() {
        if (!document.fullscreenElement) {
          document.documentElement.requestFullscreen().catch((err) => {
            console.error(
              `Error attempting to enable full-screen mode: ${err.message}`,
            );
          });
        } else {
          if (document.exitFullscreen) {
            document.exitFullscreen();
          }
        }
      }

      async function fetchMetrics() {
        try {
          const response = await fetch("/api/data");
          const data = await response.json();
          if (data.plays !== undefined) {
            document.getElementById("plays").innerHTML = data.plays;
          }
        } catch (err) {
          console.warn("Syncing...");
        }
        timeRemaining = REFRESH_INTERVAL;
      }

      setInterval(() => {
        if (timeRemaining > 0) {
          timeRemaining--;
          const progressWidth =
            ((REFRESH_INTERVAL - timeRemaining) / REFRESH_INTERVAL) * 100;
          document.getElementById("progress-fill").style.width =
            progressWidth + "%";
          document.getElementById("timer").innerText = timeRemaining;
        } else {
          fetchMetrics();
        }
      }, 1000);

      fetchMetrics();
    </script>
  </body>
</html>

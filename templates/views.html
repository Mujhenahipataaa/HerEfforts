<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Her creation ✨</title>

    <!-- Libraries -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/odometer.js/0.4.7/themes/odometer-theme-minimal.min.css"
    />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/odometer.js/0.4.7/odometer.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.2/dist/confetti.browser.min.js"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <style>
      :root {
        --bg-color: #000000;
        --glass-bg: rgba(24, 20, 21, 0.4); /* Subtle cherry tint in glass */
        --glass-border: rgba(255, 255, 255, 0.06);
        --accent: #be123c; /* Deep Cherry Red */
      }

      body {
        font-family: "Inter", sans-serif;
        background-color: var(--bg-color);

        color: #ffffff;
        -webkit-font-smoothing: antialiased;
        overflow: hidden;
      }

      /* Premium Glass Card */
      .glass-card {
        background: var(--glass-bg);
        backdrop-filter: blur(24px);
        -webkit-backdrop-filter: blur(24px);
        border: 1px solid var(--glass-border);
        border-radius: 2.5rem;
        box-shadow:
          0 25px 50px -12px rgba(0, 0, 0, 0.7),
          inset 0 1px 0 rgba(255, 255, 255, 0.05);
        position: relative;
        overflow: hidden;
      }

      .glass-card::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 1px;
        background: linear-gradient(
          90deg,
          transparent,
          rgba(190, 18, 60, 0.3),
          transparent
        );
      }

      /* Odometer Enhancements - FIXED FOR VISIBILITY */
      .counter-size {
        font-size: clamp(3rem, 12vw, 8.5rem);
        line-height: 1.1;
        color: #ffffff;
        filter: drop-shadow(0 4px 12px rgba(0, 0, 0, 0.6));
      }
      .odometer {
        font-weight: 800;
        letter-spacing: -0.05em;
      }

      /* Animated Progress Bar */
      .ios-progress {
        height: 3px;
        width: 120px;
        background: rgba(255, 255, 255, 0.08);
        border-radius: 3px;
        overflow: hidden;
        position: relative;
      }
      #progress-fill {
        height: 100%;
        width: 0%;
        background: linear-gradient(
          90deg,
          var(--accent),
          #fb7185
        ); /* Cherry to light rose */
        transition: width 1s cubic-bezier(0.4, 0, 0.2, 1);
        border-radius: 3px;
      }

      /* Micro-typography */
      .label-caps {
        letter-spacing: 0.15em;
        font-size: 0.65rem;
        font-weight: 600;
        color: #a1a1aa;
        text-transform: uppercase;
      }

      /* ETA Pill */
      .eta-badge {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        background: rgba(0, 0, 0, 0.4);
        border: 1px solid rgba(255, 255, 255, 0.04);
        border-radius: 2rem;
        padding: 0.5rem 1.25rem;
        margin-top: 1.5rem;
      }
      .eta-dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: var(--accent);
        box-shadow: 0 0 8px var(--accent);
        animation: pulse-cherry 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
      }
      @keyframes pulse-cherry {
        0%,
        100% {
          opacity: 1;
          transform: scale(1);
        }
        50% {
          opacity: 0.3;
          transform: scale(0.8);
        }
      }
      .eta-text {
        color: #a1a1aa;
        font-size: 0.7rem;
        font-weight: 500;
      }
      .eta-value {
        color: #fff;
        font-size: 0.7rem;
        font-weight: 700;
      }

      /* Cinematic Celebration Overlay */
      #celebration-overlay {
        position: fixed;
        inset: 0;
        z-index: 100;
        background: rgba(5, 5, 5, 0.85);
        backdrop-filter: blur(15px);
        -webkit-backdrop-filter: blur(15px);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.5s ease;
      }
      #celebration-overlay.show {
        opacity: 1;
        pointer-events: auto;
      }
      .celebration-content {
        transform: scale(0.9);
        transition: transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
      }
      #celebration-overlay.show .celebration-content {
        transform: scale(1);
      }
      .celebration-number {
        font-size: clamp(5rem, 20vw, 15rem);
        font-weight: 800;
        letter-spacing: -0.05em;
        line-height: 1;
        background: linear-gradient(
          135deg,
          #ffffff 0%,
          #be123c 50%,
          #fda4af 100%
        );
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        filter: drop-shadow(0 20px 40px rgba(190, 18, 60, 0.4));
      }

      /* Controls */
      .controls-btn {
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.1);
        color: #fff;
        padding: 0.6rem 1.5rem;
        border-radius: 2rem;
        cursor: pointer;
        font-size: 0.75rem;
        font-weight: 600;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        transition: all 0.2s;
      }
      .controls-btn:hover {
        background: var(--accent);
        border-color: transparent;
        transform: translateY(-1px);
        box-shadow: 0 4px 12px rgba(190, 18, 60, 0.3);
      }

      .floating-btn {
        position: fixed;
        bottom: 2rem;
        right: 2rem;
        width: 44px;
        height: 44px;
        display: flex;
        align-items: center;
        justify-content: center;
        background: rgba(28, 28, 30, 0.6);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 50%;
        cursor: pointer;
        transition: all 0.3s ease;
      }
      .floating-btn:hover {
        background: rgba(255, 255, 255, 0.15);
        transform: scale(1.05);
      }
    </style>
  </head>

  <body
    class="flex flex-col items-center justify-center min-h-screen p-4 sm:p-10"
  >
    <!-- Celebration Overlay -->
    <div id="celebration-overlay">
      <div class="celebration-content">
        <div class="celebration-number" id="celebration-num-text">-</div>
        <div
          class="text-white text-xl sm:text-3xl font-semibold tracking-widest uppercase mt-4 opacity-90"
          id="celebration-sub-text"
        >
          Milestone Reached 🎉
        </div>
        <button class="controls-btn mt-10" onclick="dismissCelebration()">
          Continue Tracking
        </button>
      </div>
    </div>

    <!-- Status Bar -->
    <div
      class="mb-8 flex items-center gap-3 bg-black/40 backdrop-blur-md border border-white/10 px-5 py-2.5 rounded-full shadow-2xl"
    >
      <span
        class="w-2 h-2 bg-green-500 rounded-full animate-pulse shadow-[0_0_8px_rgba(34,197,94,0.6)]"
      ></span>
      <span class="label-caps !text-[0.6rem]" id="connection-status"
        >Live Views</span
      >
    </div>

    <!-- Main Container -->
    <div class="w-full max-w-5xl mx-auto">
      <div class="glass-card p-10 sm:p-16 md:p-24 flex flex-col items-center">
        <p class="label-caps mb-6 opacity-60">Look! How many people saw you!</p>

        <div
          class="counter-size flex items-center justify-center w-full text-center"
        >
          <div id="plays" class="odometer">0</div>
        </div>

        <div class="eta-badge" id="eta-badge">
          <span class="eta-dot"></span>
          <span class="eta-text" id="eta-label-text"
            >Next Target: Loading...</span
          >
          <span class="eta-value" id="eta-value">--:--</span>
        </div>

        <div class="flex flex-col items-center gap-4 mt-16">
          <div class="ios-progress"><div id="progress-fill"></div></div>
          <p class="label-caps opacity-50">
            Syncing in <span id="timer" class="text-white">20</span>s
          </p>
        </div>
      </div>
    </div>

    <!-- Fullscreen Button -->
    <button
      onclick="toggleFullscreen()"
      class="floating-btn"
      title="Fullscreen"
    >
      <svg
        width="18"
        height="18"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
      >
        <path
          d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"
        ></path>
      </svg>
    </button>

    <script>
      // --- CONFIGURATION ---
      const REFRESH_INTERVAL = 5;
      const MILESTONE_INCREMENT = 100_000;

      // --- STATE ---
      let timeRemaining = REFRESH_INTERVAL;
      let lastCelebratedMilestone = null;
      let history = [];

      // --- SIMULATOR MODE ---
      let isSimulating = false;
      let simulatedPlays = 2_899_850;

      // --- UTILITIES ---
      function toggleFullscreen() {
        if (!document.fullscreenElement)
          document.documentElement
            .requestFullscreen()
            .catch((e) => console.error(e));
        else document.exitFullscreen && document.exitFullscreen();
      }

      function getTargetMilestone(currentPlays) {
        if (currentPlays === 0) return MILESTONE_INCREMENT;
        return (
          Math.ceil((currentPlays + 1) / MILESTONE_INCREMENT) *
          MILESTONE_INCREMENT
        );
      }

      function formatNumberFriendly(num) {
        if (num >= 1_000_000)
          return (num / 1_000_000).toFixed(1).replace(/\.0$/, "") + "M";
        if (num >= 1_000) return (num / 1_000).toFixed(0) + "K";
        return num.toString();
      }

      function formatETA(seconds) {
        if (!isFinite(seconds) || seconds <= 0) return "Moments away!";
        const h = Math.floor(seconds / 3600);
        const m = Math.floor((seconds % 3600) / 60);
        const s = Math.floor(seconds % 60);
        if (h > 0) return `${h}h ${m}m`;
        if (m > 0) return `${m}m ${s}s`;
        return `< 1m`;
      }

      // --- CORE LOGIC ---
      function updateETA(currentPlays) {
        const targetViews = getTargetMilestone(currentPlays);
        document.getElementById("eta-label-text").innerHTML =
          `Target ${formatNumberFriendly(targetViews)}&nbsp;—&nbsp;`;

        const now = Date.now();
        history.push({ plays: currentPlays, ts: now });
        if (history.length > 5) history.shift();

        if (history.length < 2) {
          document.getElementById("eta-value").textContent = "Calculating...";
          return;
        }

        const oldest = history[0];
        const viewsDelta = currentPlays - oldest.plays;
        const timeDelta = (now - oldest.ts) / 1000;

        if (viewsDelta <= 0 || timeDelta <= 0) return;

        const ratePerSec = viewsDelta / timeDelta;
        const remaining = targetViews - currentPlays;
        const etaSecs = remaining / ratePerSec;

        document.getElementById("eta-value").textContent = formatETA(etaSecs);
      }

      function triggerCelebration(milestone) {
        if (lastCelebratedMilestone === milestone) return;
        lastCelebratedMilestone = milestone;

        const formatted = formatNumberFriendly(milestone);
        document.getElementById("celebration-num-text").textContent = formatted;
        document.getElementById("celebration-overlay").classList.add("show");

        const duration = 5000;
        const end = Date.now() + duration;
        // Updated palette for confetti: Cherries, Roses, Deep reds, and Premium White
        const colors = ["#be123c", "#fb7185", "#ffffff", "#9f1239"];

        (function frame() {
          confetti({
            particleCount: 5,
            angle: 60,
            spread: 55,
            origin: { x: 0 },
            colors,
            zIndex: 1000,
          });
          confetti({
            particleCount: 5,
            angle: 120,
            spread: 55,
            origin: { x: 1 },
            colors,
            zIndex: 1000,
          });
          if (Date.now() < end) requestAnimationFrame(frame);
        })();
      }

      function dismissCelebration() {
        document.getElementById("celebration-overlay").classList.remove("show");
      }

      // --- DATA FETCHING & LOOP ---
      async function fetchMetrics() {
        let currentPlays = 0;

        try {
          if (isSimulating) throw new Error("Forced Simulation");
          const response = await fetch("/api/plays");
          if (!response.ok) throw new Error("API Offline");
          const data = await response.json();
          currentPlays = data.plays;
          document.getElementById("connection-status").textContent =
            "Live Server Connected";
        } catch (err) {
          isSimulating = true;
          document.getElementById("connection-status").textContent =
            "Simulation Mode Active";
          document
            .getElementById("connection-status")
            .previousElementSibling.classList.replace(
              "bg-green-500",
              "bg-rose-600" /* Replaced simulation orange badge with rich rose */,
            );

          simulatedPlays += Math.floor(Math.random() * 200) + 25;
          currentPlays = simulatedPlays;
        }

        if (lastCelebratedMilestone === null) {
          lastCelebratedMilestone =
            Math.floor(currentPlays / MILESTONE_INCREMENT) *
            MILESTONE_INCREMENT;
        }

        document.getElementById("plays").innerHTML = currentPlays;
        updateETA(currentPlays);

        const currentMilestoneFloor =
          Math.floor(currentPlays / MILESTONE_INCREMENT) * MILESTONE_INCREMENT;
        if (
          currentMilestoneFloor > lastCelebratedMilestone &&
          currentMilestoneFloor > 0
        ) {
          triggerCelebration(currentMilestoneFloor);
        }

        timeRemaining = REFRESH_INTERVAL;
      }

      setInterval(() => {
        if (timeRemaining > 0) {
          timeRemaining--;
          const pct =
            ((REFRESH_INTERVAL - timeRemaining) / REFRESH_INTERVAL) * 100;
          document.getElementById("progress-fill").style.width = pct + "%";
          document.getElementById("timer").innerText = timeRemaining;
        } else {
          fetchMetrics();
        }
      }, 1000);

      fetchMetrics();
    </script>
  </body>
</html>
